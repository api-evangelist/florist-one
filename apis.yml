    name: Florist One API
    description: >-
      Florist One provides a free REST API for searching available flower
      products, retrieving product details and imagery, placing orders for
      delivery through the Florist One network, and checking order status.
      The API is designed for ecommerce, gifting, and concierge integrations
      that want to offer same-day or next-day flower delivery.
