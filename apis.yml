aid: florist-one
name: Florist One
description: >-
  Florist One is an online flower delivery service that specializes in
  creating and delivering floral arrangements through a network of local
  florists across the United States and Canada. Florist One offers a free
  REST web service that lets developers integrate flower products, ordering,
  and delivery into their own applications. The API is documented for use
  from any common web language including Java, PHP, ASP.NET, JavaScript,
  Node, Python, Perl, Ruby, and ColdFusion.
